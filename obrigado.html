<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado! - Virtus Solutions</title>
  
  <link rel="stylesheet" href="assets/css/style.css" />
  
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .thank-you-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    .thank-you-box h1 {
      font-size: 2rem;
      color: #007BFF;
      margin-bottom: 20px;
    }

    .thank-you-box p {
      color: #333;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .thank-you-box a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background-color: #007BFF;
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .thank-you-box a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="thank-you-box">
    <h1>Mensagem enviada com sucesso!</h1>
    <p>Agradecemos seu contato. Em breve, nossa equipe retornará com uma resposta.</p>
    <a href="index.html">Voltar para o site</a>
  </div>

</body>
</html>
