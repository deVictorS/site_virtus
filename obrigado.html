<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado! - Virtus Solutions</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/style.css" />
  
  <style>
    body {
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
      margin: 0;
      overflow: hidden;
      background-image: radial-gradient(circle at top right, rgba(0, 86, 179, 0.05), transparent 40%);
                  background-color: #0f0f0f;
    }

    .thank-you-box {
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      padding: 50px 30px;
      max-width: 500px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .thank-you-box h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: #fff;
      margin-bottom: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .thank-you-box p {
      color: #a0aec0;
      font-size: 1rem;
      margin-bottom: 35px;
      line-height: 1.5;
    }

    .thank-you-box a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background-color: #0056b3;
      padding: 14px 32px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 4px 15px rgba(0, 86, 179, 0.3);
    }

    .thank-you-box a:hover {
      background-color: #fff;
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <div class="thank-you-box">
    <h1>Mensagem enviada com sucesso!</h1>
    <p>Agradecemos seu contato. Em breve, nossa equipe retornará com uma resposta.</p>
    <a href="index.html">Voltar para o site</a>
  </div>

</body>
</html>
