# esse workflow é acionado quando há um push para a branch main ou quando um pull request é aberto, sincronizado ou reaberto
# ele executa uma análise de código usando o SonarQube, que é uma ferramenta de análise de código estático
name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@8c71dc049391c8673f4f47f33d19127d1999a6f2 # v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=deVictorS_site_virtus
            -Dsonar.organization=devictors
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io